name: Pack Node Modules for Windows

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [ main ] # 可选：每次推送自动生成

jobs:
  pack:
    runs-on: windows-latest   # 关键：使用 Windows 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci   # 或 npm install

      - name: Pack entire project
        run: |
          # 排除 .git 和不必要的文件以减小体积
          Compress-Archive -Path * -DestinationPath frontend-full.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-with-node-modules
          path: frontend-full.zip

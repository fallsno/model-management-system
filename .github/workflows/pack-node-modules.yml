name: Pack Frontend for Windows (Offline Dev)

on:
  workflow_dispatch:

jobs:
  pack:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Find frontend directory (locate package.json)
        id: find_frontend
        shell: pwsh
        run: |
          $frontendDir = Get-ChildItem -Recurse -Filter "package.json" | Where-Object { $_.FullName -notmatch "node_modules" } | Select-Object -First 1
          if (-not $frontendDir) {
            Write-Error "No package.json found in repository"
            exit 1
          }
          $frontendPath = $frontendDir.DirectoryName
          Write-Output "Frontend directory: $frontendPath"
          echo "FRONTEND_DIR=$frontendPath" >> $env:GITHUB_ENV

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm install
      - name: Update dependencies to latest compatible versions
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm update

      - name: Remove .git folder (reduce artifact size)
        run: if (Test-Path .git) { Remove-Item .git -Recurse -Force }

      - name: Upload frontend folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-offline-dev
          path: ${{ env.FRONTEND_DIR }}

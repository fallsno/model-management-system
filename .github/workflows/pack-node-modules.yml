name: Pack Node Modules for Windows

on:
  workflow_dispatch:

jobs:
  pack:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./frontend   # 关键：指定工作目录
        run: npm install

      - name: Remove .git folder (from root, optional)
        run: if (Test-Path .git) { Remove-Item .git -Recurse -Force }

      - name: Upload entire frontend folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-with-node-modules
          path: ./frontend   # 只上传 frontend 目录，避免包含 backend 等无关文件

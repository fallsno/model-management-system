name: Pack Node Modules for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  pack:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Pack entire project (using tar)
        run: |
          # 使用 tar 打包当前目录，排除 .git 和压缩包自身
          tar -czf frontend-full.tar.gz --exclude=.git --exclude=frontend-full.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-with-node-modules
          path: frontend-full.tar.gz
